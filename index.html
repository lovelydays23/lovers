<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Şarkımız</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
overflow:hidden;
color:white;
background-image:url("foto.jpg");
background-size:cover;
background-position:center;
height:100vh;
}

/* geri sayım ekranı */

#countdown{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#c6a97a;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

/* vignette */

#countdown::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle,
rgba(255,255,255,0.1) 0%,
rgba(0,0,0,0.3) 60%,
rgba(0,0,0,0.65) 100%);
pointer-events:none;
}

/* film frame */

.film-frame{
position:relative;
padding:70px 60px;
background:#c6a97a;
}

/* film delikleri */

.film-frame::before,
.film-frame::after{
content:"";
position:absolute;
left:0;
width:100%;
height:28px;
background:repeating-linear-gradient(
90deg,
black 0px,
black 22px,
white 22px,
white 38px
);
}

.film-frame::before{top:-28px;}
.film-frame::after{bottom:-28px;}

/* crosshair */

.crosshair{
position:absolute;
width:420px;
height:420px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
}

.crosshair::before{
content:"";
position:absolute;
left:50%;
top:0;
width:3px;
height:100%;
background:repeating-linear-gradient(
to bottom,
black 0px,
black 14px,
transparent 14px,
transparent 26px
);
transform:translateX(-50%);
}

.crosshair::after{
content:"";
position:absolute;
top:50%;
left:0;
width:100%;
height:3px;
background:repeating-linear-gradient(
to right,
black 0px,
black 14px,
transparent 14px,
transparent 26px
);
transform:translateY(-50%);
}

/* çember */

.circle{
position:relative;
width:280px;
height:280px;
border:8px solid #f5f5f5;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:140px;
font-weight:bold;
color:black;
overflow:hidden;
}

/* ikinci halka */

.circle::before{
content:"";
position:absolute;
width:240px;
height:240px;
border:5px solid #f5f5f5;
border-radius:50%;
}

/* dönen üçgen film dilimi */

.slice{
position:absolute;
width:100%;
height:100%;
clip-path:polygon(50% 50%, 100% 0, 100% 100%);
background:rgba(0,0,0,0.15);
animation:spin 1s linear infinite;
transform-origin:center;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* ana ekran */

.container{
position:relative;
top:36vh;
z-index:2;
opacity:0;
animation:show 1.5s forwards;
animation-delay:3.5s;
}

@keyframes show{
to{opacity:1;}
}

button{
padding:15px 40px;
font-size:22px;
border:none;
border-radius:40px;
background:#b3002d;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="countdown">

<div class="film-frame">

<div class="crosshair"></div>

<div class="circle">

<div class="slice"></div>

<div id="num">3</div>

</div>

</div>

</div>

<div class="container">
<h1>Bizim Şarkımız ❤️</h1>
<button onclick="cal()">Şarkıyı Çal</button>
</div>

<audio id="muzik">
<source src="sarki.mp3" type="audio/mpeg">
</audio>

<audio id="countSound">
<source src="countdown321.mp3" type="audio/mpeg">
</audio>

<script>

let n=3;
let sound=document.getElementById("countSound");

let interval=setInterval(()=>{

sound.currentTime=0;
sound.play().catch(()=>{});

n--;

if(n>0){

document.getElementById("num").innerHTML=n;

}else{

clearInterval(interval);
document.getElementById("countdown").style.display="none";

}

},1000);

function cal(){
document.getElementById("muzik").play();
}

</script>

</body>
</html>
