<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bizim Şarkımız ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
overflow:hidden;
}

/* geri sayım ekranı */

#countdownScreen{
position:fixed;
width:100%;
height:100%;
background:#c5a06a;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
transition:opacity 0.8s ease;
}

/* film şeridi */

.filmTop,
.filmBottom{
position:absolute;
width:100%;
height:40px;
background:repeating-linear-gradient(
90deg,
black 0px,
black 20px,
white 20px,
white 40px
);
}

.filmTop{top:0;}
.filmBottom{bottom:0;}

/* play buton */

.playBtn{
width:120px;
height:120px;
background:black;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.playBtn:after{
content:"";
border-left:35px solid white;
border-top:20px solid transparent;
border-bottom:20px solid transparent;
margin-left:5px;
}

/* geri sayım yazı */

#countdownNumber{
font-size:120px;
color:white;
position:absolute;
}

/* düğün ekranı */

#wedding{
position:fixed;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1520854221256-17451cc331bf") center/cover no-repeat;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
opacity:0;
transition:opacity 0.8s ease;
}

#wedding h1{
font-size:32px;
margin-bottom:20px;
}

.musicBtn{
background:#e91e63;
border:none;
padding:14px 30px;
font-size:18px;
border-radius:30px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<!-- geri sayım ekranı -->

<div id="countdownScreen">

<div class="filmTop"></div>
<div class="filmBottom"></div>

<div class="playBtn" id="playBtn"></div>

<div id="countdownNumber"></div>

</div>

<!-- düğün ekranı -->

<div id="wedding">

<h1>Bizim Şarkımız ❤️</h1>

<button class="musicBtn" id="musicBtn">Şarkıyı Çal</button>

</div>

<audio id="countSound" src="countdown321.mp3"></audio>
<audio id="music" src="music.mp3"></audio>

<script>

let number=3;

const playBtn = document.getElementById("playBtn");
const musicBtn = document.getElementById("musicBtn");
const music = document.getElementById("music");
const sound = document.getElementById("countSound");

playBtn.addEventListener("click", startCountdown);

musicBtn.addEventListener("click", function(){
music.currentTime = 0;
music.play().catch(()=>{});
});

function startCountdown(){

sound.currentTime=0;
sound.play().catch(()=>{});

playBtn.style.display="none";

document.getElementById("countdownNumber").innerText=number;

let interval=setInterval(()=>{

number--;

if(number>0){

document.getElementById("countdownNumber").innerText=number;

}else{

clearInterval(interval);

sound.pause();
sound.currentTime=0;

document.getElementById("countdownScreen").style.opacity="0";

setTimeout(()=>{

document.getElementById("countdownScreen").style.display="none";

let wedding=document.getElementById("wedding");
wedding.style.opacity="1";

},800);

}

},1000);

}

</script>

</body>
</html>
