<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Şarkımız ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
overflow:hidden;
color:white;

background-image:url("foto.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
}

/* ARKA PLAN KARARTMA */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:1;
}

/* GÜL KATMANI */

#petal-layer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:2;
}

/* ANA ALAN */

.container{
position:relative;
top:30vh;
z-index:3;
display:flex;
flex-direction:column;
align-items:center;
}

/* NETFLIX TARZI YAZI */

h1{
font-size:48px;
margin-bottom:25px;
font-weight:700;
letter-spacing:1px;

opacity:0;
transform:translateY(20px);

animation:fadeIn 2s ease forwards;

text-shadow:
0 0 10px rgba(255,255,255,0.8),
0 0 25px rgba(255,0,70,0.8),
0 0 45px rgba(255,0,70,0.7);
}

/* YAZI FADE */

@keyframes fadeIn{
to{
opacity:1;
transform:translateY(0);
}
}

/* BUTON */

button{
padding:16px 45px;
font-size:22px;
border:none;
border-radius:50px;
background:#b3002d;
color:white;
cursor:pointer;

box-shadow:
0 10px 25px rgba(0,0,0,0.4);

transition:0.3s;
}

button:hover{
transform:scale(1.07);
}

/* TELEFON */

@media(max-width:600px){

.container{
top:36vh;
padding:20px;
}

h1{
font-size:32px;
}

button{
font-size:18px;
padding:14px 32px;
}

}

/* GÜL YAPRAĞI */

.petal{
position:absolute;
top:-80px;
width:28px;
height:28px;
background-image:url("petal.png");
background-size:contain;
background-repeat:no-repeat;

animation:fall linear forwards;
}

/* GERÇEKÇİ DÜŞME */

@keyframes fall{

0%{
transform:translateY(-100px) translateX(0) rotate(0deg);
opacity:1;
}

30%{
transform:translateY(35vh) translateX(40px) rotate(120deg);
}

60%{
transform:translateY(70vh) translateX(-40px) rotate(240deg);
}

100%{
transform:translateY(110vh) translateX(20px) rotate(360deg);
opacity:0;
}

}

</style>
</head>

<body>

<div id="petal-layer"></div>

<div class="container">

<h1>Bizim Şarkımız ❤️</h1>

<button onclick="cal()">Şarkıyı Çal</button>

</div>

<audio id="muzik">
<source src="sarki.mp3" type="audio/mpeg">
</audio>

<script>

function cal(){

let muzik=document.getElementById("muzik");
muzik.play();

let layer=document.getElementById("petal-layer");

/* GÜL YAĞMURU */

for(let i=0;i<70;i++){

let petal=document.createElement("div");

petal.className="petal";

petal.style.left=Math.random()*100+"vw";

let size=Math.random()*20+20;
petal.style.width=size+"px";
petal.style.height=size+"px";

petal.style.animationDuration=(Math.random()*4+5)+"s";

petal.style.transform="rotate("+Math.random()*360+"deg)";

layer.appendChild(petal);

setTimeout(()=>{
petal.remove();
},9000);

}

}

</script>

</body>
</html>
