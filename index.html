<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Şarkımız ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
overflow:hidden;
color:white;

background-image:url("foto.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:0;
}

.container{
position:relative;
top:40vh;
z-index:2;
padding:20px;
}

h1{
font-size:40px;
margin-bottom:25px;
transition:0.5s;
}

.parla{
text-shadow:
0 0 10px #fff,
0 0 20px #ff4d6d,
0 0 40px #ff4d6d;
}

button{
padding:15px 40px;
font-size:22px;
border:none;
border-radius:40px;
background:#b3002d;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
}

@media(max-width:600px){

h1{
font-size:30px;
}

button{
font-size:18px;
padding:12px 30px;
}

}

/* GÜL YAPRAĞI */

.petal{
position:absolute;
top:-50px;
width:25px;
height:25px;
background-image:url("petal.png");
background-size:contain;
background-repeat:no-repeat;
animation:fall linear forwards;
z-index:3;
pointer-events:none;
}

@keyframes fall{

0%{
transform:translateY(-50px) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}

}

</style>
</head>

<body>

<div class="container">
<h1 id="baslik">Bizim Şarkımız ❤️</h1>
<button onclick="cal()">Şarkıyı Çal</button>
</div>

<audio id="muzik">
<source src="sarki.mp3" type="audio/mpeg">
</audio>

<script>

function cal(){

let muzik=document.getElementById("muzik");
muzik.play();

document.getElementById("baslik").classList.add("parla");

/* GÜL YAPRAĞI YAĞMURU */

for(let i=0;i<50;i++){

let petal=document.createElement("div");

petal.className="petal";

petal.style.left=Math.random()*100+"vw";

petal.style.animationDuration=(Math.random()*3+4)+"s";

document.body.appendChild(petal);

setTimeout(()=>{
petal.remove();
},7000);

}

}

</script>

</body>
</html>
