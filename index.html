<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bizim Şarkımız ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
overflow:hidden;
}

#countdownScreen{
position:fixed;
width:100%;
height:100%;
background:#c5a06a;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
transition:opacity 0.8s ease;
}

.filmTop,.filmBottom{
position:absolute;
width:100%;
height:40px;
background:repeating-linear-gradient(
90deg,
black 0px,
black 20px,
white 20px,
white 40px
);
}

.filmTop{top:0;}
.filmBottom{bottom:0;}

.playBtn{
width:120px;
height:120px;
background:black;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.playBtn:after{
content:"";
border-left:35px solid white;
border-top:20px solid transparent;
border-bottom:20px solid transparent;
margin-left:5px;
}

#countdownNumber{
font-size:120px;
color:white;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

#wedding{
position:fixed;
width:100%;
height:100%;
background:url("foto.jpg") center/cover no-repeat;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
opacity:0;
transition:opacity 0.8s ease;
}

#wedding h1{
font-size:32px;
margin-bottom:20px;
}

.musicBtn{
background:#e91e63;
border:none;
padding:14px 30px;
font-size:18px;
border-radius:30px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="countdownScreen">

<div class="filmTop"></div>
<div class="filmBottom"></div>

<div class="playBtn" id="playButton"></div>

<div id="countdownNumber"></div>

</div>

<div id="wedding">

<h1>Bizim Şarkımız ❤️</h1>

<button class="musicBtn" id="musicButton">Şarkıyı Çal</button>

</div>

<audio id="countSound" preload="auto">
<source src="countdown321.mp3" type="audio/mpeg">
</audio>

<audio id="music" preload="auto">
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

let number=3;

const playBtn=document.getElementById("playButton");
const musicBtn=document.getElementById("musicButton");
const countSound=document.getElementById("countSound");
const music=document.getElementById("music");

playBtn.addEventListener("click", startCountdown);

musicBtn.addEventListener("click", function(){
music.play();
});

function startCountdown(){

playBtn.style.display="none";

countSound.currentTime=0;
countSound.play().catch(()=>{});

document.getElementById("countdownNumber").innerText=number;

let interval=setInterval(function(){

number--;

if(number>0){

document.getElementById("countdownNumber").innerText=number;

}else{

clearInterval(interval);

countSound.pause();
countSound.currentTime=0;

document.getElementById("countdownScreen").style.opacity="0";

setTimeout(function(){

document.getElementById("countdownScreen").style.display="none";
document.getElementById("wedding").style.opacity="1";

},800);

}

},1000);

}

</script>

</body>
</html>
