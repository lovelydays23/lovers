<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Şarkımız ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
overflow:hidden;
color:white;

background-image:url("foto.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
}

/* KARARTMA */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:1;
}

/* SİNEMATİK SAYIM */

#countdown{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
font-size:120px;
font-weight:bold;
z-index:10;
animation:fadeOut 1s ease forwards;
animation-delay:4s;
}

@keyframes fadeOut{
to{
opacity:0;
visibility:hidden;
}
}

/* ANA İÇERİK */

.container{
position:relative;
top:30vh;
z-index:3;
opacity:0;
animation:showPage 1.5s ease forwards;
animation-delay:4s;
}

@keyframes showPage{
to{
opacity:1;
}
}

h1{
font-size:48px;
margin-bottom:25px;
text-shadow:
0 0 10px white,
0 0 25px #ff2e63,
0 0 45px #ff2e63;
}

/* BUTON */

button{
padding:16px 45px;
font-size:22px;
border:none;
border-radius:50px;
background:#b3002d;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
}

/* TELEFON */

@media(max-width:600px){

.container{
top:36vh;
}

h1{
font-size:32px;
}

#countdown{
font-size:80px;
}

}

/* GÜL YAPRAĞI */

#petal-layer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:2;
}

.petal{
position:absolute;
top:-80px;
width:28px;
height:28px;
background-image:url("petal.png");
background-size:contain;
background-repeat:no-repeat;
animation:fall linear forwards;
}

@keyframes fall{

0%{
transform:translateY(-100px) translateX(0) rotate(0deg);
opacity:1;
}

50%{
transform:translateY(60vh) translateX(40px) rotate(180deg);
}

100%{
transform:translateY(110vh) translateX(-40px) rotate(360deg);
opacity:0;
}

}

</style>
</head>

<body>

<div id="countdown">3</div>

<div id="petal-layer"></div>

<div class="container">

<h1>Bizim Şarkımız ❤️</h1>

<button onclick="cal()">Şarkıyı Çal</button>

</div>

<audio id="muzik">
<source src="sarki.mp3" type="audio/mpeg">
</audio>

<script>

/* GERİ SAYIM */

let sayilar=["3","2","1","❤️"];
let index=0;

let sayim=setInterval(()=>{

index++;

if(index<sayilar.length){

document.getElementById("countdown").innerHTML=sayilar[index];

}else{

clearInterval(sayim);

}

},1000);


/* ŞARKI VE GÜLLER */

function cal(){

let muzik=document.getElementById("muzik");
muzik.play();

let layer=document.getElementById("petal-layer");

for(let i=0;i<70;i++){

let petal=document.createElement("div");

petal.className="petal";

petal.style.left=Math.random()*100+"vw";

let size=Math.random()*20+20;
petal.style.width=size+"px";
petal.style.height=size+"px";

petal.style.animationDuration=(Math.random()*4+5)+"s";

layer.appendChild(petal);

setTimeout(()=>{
petal.remove();
},9000);

}

}

</script>

</body>
</html>
