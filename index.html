<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Şarkımız</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
overflow:hidden;
color:white;
background-image:url("foto.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
}

/* karartma */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:1;
}

/* geri sayım ekranı */

#countdown{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
z-index:10;
transition:opacity 1s;
}

/* daire */

.circle{
position:relative;
width:220px;
height:220px;
border:6px solid white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:80px;
font-weight:bold;
}

/* dönen çizgi */

.circle::after{
content:"";
position:absolute;
width:4px;
height:110px;
background:white;
top:0;
left:50%;
transform-origin:bottom;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* ana sayfa */

.container{
position:relative;
top:30vh;
z-index:3;
opacity:0;
animation:showPage 1.5s ease forwards;
animation-delay:3.5s;
}

@keyframes showPage{
to{opacity:1;}
}

h1{
font-size:48px;
margin-bottom:25px;
text-shadow:
0 0 10px white,
0 0 25px #ff2e63,
0 0 45px #ff2e63;
}

button{
padding:16px 45px;
font-size:22px;
border:none;
border-radius:50px;
background:#b3002d;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
}

/* telefon */

@media(max-width:600px){

.circle{
width:160px;
height:160px;
font-size:60px;
}

.container{
top:36vh;
}

h1{
font-size:30px;
}

}

</style>
</head>

<body>

<div id="countdown">
<div class="circle" id="num">3</div>
</div>

<div class="container">

<h1>Bizim Şarkımız ❤️</h1>

<button onclick="cal()">Şarkıyı Çal</button>

</div>

<audio id="muzik">
<source src="sarki.mp3" type="audio/mpeg">
</audio>

<script>

/* PROJEKTÖR SESİ (kod içinde) */

let ctx=new (window.AudioContext||window.webkitAudioContext)();

function projectorSound(){

let osc=ctx.createOscillator();
let gain=ctx.createGain();

osc.type="square";
osc.frequency.value=18;

gain.gain.value=0.05;

osc.connect(gain);
gain.connect(ctx.destination);

osc.start();

setTimeout(()=>{
osc.stop();
},3000);

}

projectorSound();

/* GERİ SAYIM */

let sayi=3;

let interval=setInterval(()=>{

sayi--;

if(sayi>0){

document.getElementById("num").innerHTML=sayi;

}else{

clearInterval(interval);

let c=document.getElementById("countdown");

c.style.opacity="0";

setTimeout(()=>{
c.style.display="none";
},1000);

}

},1000);


/* şarkı */

function cal(){

let muzik=document.getElementById("muzik");
muzik.play();

}

</script>

</body>
</html>
