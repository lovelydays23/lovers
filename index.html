<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Şarkımız ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
overflow:hidden;
color:white;

background-image:url("foto.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:0;
}

.container{
position:relative;
top:45vh;
z-index:2;
}

h1{
font-size:40px;
margin-bottom:25px;
transition:0.5s;
}

.parla{
text-shadow:
0 0 10px #fff,
0 0 20px #ff4d6d,
0 0 40px #ff4d6d;
}

button{
padding:15px 40px;
font-size:22px;
border:none;
border-radius:40px;
background:#b3002d;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
}

/* TELEFON */

@media(max-width:600px){

.container{
top:50vh;
}

h1{
font-size:28px;
}

button{
font-size:18px;
}

}

/* GÜL YAPRAĞI */

.petal{
position:absolute;
top:-80px;
width:30px;
height:30px;
background-image:url("petal.png");
background-size:contain;
background-repeat:no-repeat;
z-index:3;
pointer-events:none;
animation:fall linear forwards;
}

/* GERÇEKÇİ DÜŞÜŞ */

@keyframes fall{

0%{
transform:translateY(-100px) translateX(0px) rotate(0deg);
opacity:1;
}

25%{
transform:translateY(30vh) translateX(40px) rotate(90deg);
}

50%{
transform:translateY(55vh) translateX(-40px) rotate(180deg);
}

75%{
transform:translateY(80vh) translateX(30px) rotate(270deg);
}

100%{
transform:translateY(110vh) translateX(-30px) rotate(360deg);
opacity:0;
}

}

</style>
</head>

<body>

<div class="container">
<h1 id="baslik">Bizim Şarkımız ❤️</h1>
<button onclick="cal()">Şarkıyı Çal</button>
</div>

<audio id="muzik">
<source src="sarki.mp3" type="audio/mpeg">
</audio>

<script>

function cal(){

let muzik=document.getElementById("muzik");
muzik.play();

document.getElementById("baslik").classList.add("parla");

/* GERÇEKÇİ GÜL YAĞMURU */

for(let i=0;i<70;i++){

let petal=document.createElement("div");

petal.className="petal";

petal.style.left=Math.random()*100+"vw";

/* farklı boyut */

let size=Math.random()*20+20;
petal.style.width=size+"px";
petal.style.height=size+"px";

/* farklı hız */

petal.style.animationDuration=(Math.random()*4+5)+"s";

/* farklı dönüş */

petal.style.transform="rotate("+Math.random()*360+"deg)";

document.body.appendChild(petal);

setTimeout(()=>{
petal.remove();
},9000);

}

}

</script>

</body>
</html>
