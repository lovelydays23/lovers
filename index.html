<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bizim Şarkımız ❤️</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
overflow:hidden;
}

/* COUNTDOWN EKRANI */

#countdownScreen{
position:fixed;
width:100%;
height:100%;
background:#c5a06a;
display:flex;
align-items:center;
justify-content:center;
animation:flicker 0.15s infinite;
}

/* film şeritleri */

.filmTop,.filmBottom{
position:absolute;
width:100%;
height:40px;
background:repeating-linear-gradient(
90deg,
black 0px,
black 20px,
white 20px,
white 40px
);
}

.filmTop{top:0;}
.filmBottom{bottom:0;}

/* hedef çizgileri */

.crossH{
position:absolute;
width:100%;
height:3px;
background:black;
}

.crossV{
position:absolute;
height:100%;
width:3px;
background:black;
}

/* halkalar */

.circle1{
position:absolute;
width:420px;
height:420px;
border:8px solid rgba(255,255,255,0.9);
border-radius:50%;
}

.circle2{
position:absolute;
width:340px;
height:340px;
border:8px solid rgba(255,255,255,0.9);
border-radius:50%;
}

/* dönen film dilimi */

.wedge{
position:absolute;
width:420px;
height:420px;
border-radius:50%;
background:conic-gradient(
rgba(0,0,0,0.35) 0deg,
rgba(0,0,0,0.35) 70deg,
transparent 70deg
);
animation:spin 1s linear infinite;
opacity:0;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* sayılar */

#countdownNumber{
font-size:240px;
font-weight:900;
color:black;
position:absolute;
font-family:Impact,Arial Black,sans-serif;
}

/* play butonu */

.playBtn{
width:120px;
height:120px;
background:black;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:10;
}

.playBtn:after{
content:"";
border-left:35px solid white;
border-top:20px solid transparent;
border-bottom:20px solid transparent;
margin-left:5px;
}

/* film grain efekti */

.grain{
pointer-events:none;
position:fixed;
width:100%;
height:100%;
background:radial-gradient(rgba(0,0,0,0.15) 1px, transparent 1px);
background-size:3px 3px;
opacity:0.2;
animation:grainMove 0.3s infinite;
}

@keyframes grainMove{
0%{transform:translate(0,0)}
25%{transform:translate(-2px,2px)}
50%{transform:translate(2px,-2px)}
75%{transform:translate(-1px,1px)}
100%{transform:translate(1px,-1px)}
}

/* projektör titreme */

@keyframes flicker{
0%{opacity:1}
50%{opacity:0.97}
100%{opacity:1}
}

/* siyah geçiş ekranı */

#blackFade{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
opacity:0;
pointer-events:none;
transition:opacity 1s;
z-index:999;
}

/* düğün ekranı */

#wedding{
position:fixed;
width:100%;
height:100%;
background:url("foto.jpg") center/cover no-repeat;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
}

#wedding h1{
font-size:34px;
margin-bottom:20px;
text-shadow:0 0 10px black;
}

.musicBtn{
background:#e91e63;
border:none;
padding:14px 30px;
font-size:18px;
border-radius:30px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="countdownScreen">

<div class="filmTop"></div>
<div class="filmBottom"></div>

<div class="crossH"></div>
<div class="crossV"></div>

<div class="circle1"></div>
<div class="circle2"></div>

<div class="wedge" id="wedge"></div>

<div id="countdownNumber"></div>

<div class="playBtn" onclick="startCountdown()"></div>

</div>

<div class="grain"></div>

<div id="blackFade"></div>

<div id="wedding">

<h1>Bizim Şarkımız ❤️</h1>

<button class="musicBtn" onclick="playMusic()">Şarkıyı Çal</button>

</div>

<audio id="countSound" src="countdown321.mp3"></audio>
<audio id="music" src="music.mp3"></audio>

<script>

function startCountdown(){

document.querySelector(".playBtn").style.display="none";

let number=3;

const wedge=document.getElementById("wedge");
const display=document.getElementById("countdownNumber");
const sound=document.getElementById("countSound");

wedge.style.opacity="1";

sound.currentTime=0;
sound.play();

display.innerText=number;

let interval=setInterval(function(){

number--;

if(number>0){

display.innerText=number;

}else{

clearInterval(interval);

sound.pause();

let fade=document.getElementById("blackFade");

fade.style.opacity="1";

setTimeout(function(){

document.getElementById("countdownScreen").style.display="none";

setTimeout(function(){

fade.style.opacity="0";
document.getElementById("wedding").style.display="flex";

},1000);

},3000);

}

},1000);

}

function playMusic(){
document.getElementById("music").play();
}

</script>

</body>
</html>
