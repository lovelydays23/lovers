<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Şarkımız</title><style>

body{
margin:0;
font-family:Arial;
text-align:center;
overflow:hidden;
color:white;
background-image:url("foto.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
}

/* arka plan karartma */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:1;
}

/* geri sayım ekranı */

#countdown{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#222;
display:flex;
align-items:center;
justify-content:center;
z-index:10;
animation:flicker 0.1s infinite;
}

/* film titremesi */

@keyframes flicker{
0%{opacity:1}
50%{opacity:0.97}
100%{opacity:1}
}

/* film grain */

#countdown::after{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:url("https://upload.wikimedia.org/wikipedia/commons/7/76/Film_grain.png");
opacity:0.18;
mix-blend-mode:overlay;
}

/* film şeridi */

.film{
position:relative;
background:#444;
padding:60px 40px;
border-radius:6px;
}

/* film delikleri */

.film::before,
.film::after{
content:"";
position:absolute;
left:0;
width:100%;
height:20px;
background:
repeating-linear-gradient(
90deg,
black 0px,
black 20px,
white 20px,
white 30px
);
}

.film::before{top:-20px;}
.film::after{bottom:-20px;}

/* hedef çizgileri */

.crosshair{
position:absolute;
width:220px;
height:220px;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.crosshair::before{
content:"";
position:absolute;
width:2px;
height:100%;
background:white;
left:50%;
}

.crosshair::after{
content:"";
position:absolute;
height:2px;
width:100%;
background:white;
top:50%;
}

/* büyük sinema diski */

.circle{
position:relative;
width:220px;
height:220px;
background:#666;
border:6px solid white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:90px;
font-weight:bold;
color:white;
}

/* dönen sayaç */

.circle::after{
content:"";
position:absolute;
width:4px;
height:110px;
background:white;
top:0;
left:50%;
transform-origin:bottom;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* ana içerik */

.container{
position:relative;
top:34vh;
z-index:3;
opacity:0;
animation:showPage 1.5s ease forwards;
animation-delay:3.5s;
}

@keyframes showPage{
to{opacity:1;}
}

h1{
font-size:48px;
margin-bottom:25px;
text-shadow:
0 0 10px white,
0 0 25px #ff2e63,
0 0 45px #ff2e63;
}

button{
padding:16px 45px;
font-size:22px;
border:none;
border-radius:50px;
background:#b3002d;
color:white;
cursor:pointer;
}

@media(max-width:600px){

.circle{
width:160px;
height:160px;
font-size:60px;
}

.crosshair{
width:160px;
height:160px;
}

h1{
font-size:30px;
}

}

</style></head><body><div id="countdown"><div class="film"><div class="crosshair"></div><div class="circle" id="num">3</div></div></div><div class="container"><h1>Bizim Şarkımız ❤️</h1><button onclick="cal()">Şarkıyı Çal</button>

</div><audio id="muzik">
<source src="sarki.mp3" type="audio/mpeg">
</audio><script>

let sayi=3;

let interval=setInterval(()=>{

sayi--;

if(sayi>0){

document.getElementById("num").innerHTML=sayi;

}else{

clearInterval(interval);

let c=document.getElementById("countdown");

c.style.opacity="0";

setTimeout(()=>{
c.style.display="none";
},1000);

}

},1000);

function cal(){

document.getElementById("muzik").play();

}

</script></body>
</html>
