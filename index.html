<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Şarkımız ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
overflow:hidden;
color:white;

/* ARKA PLAN FOTOĞRAF */
background-image:url("foto.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
}

/* karartma efekti */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:0;
}

.container{
position:relative;
top:40vh;
z-index:2;
}

h1{
font-size:40px;
margin-bottom:20px;
}

/* BUTON */
button{
padding:15px 40px;
font-size:22px;
border:none;
border-radius:40px;
background:#b3002d; /* koyu kırmızı */
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
}

/* ÇİÇEK ANİMASYONU */

.flower{
position:absolute;
top:-10vh;
color:white;
font-size:25px;
animation:fall linear infinite;
z-index:1;
}

@keyframes fall{
0%{
transform:translateY(-10vh) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(360deg);
}
}

</style>
</head>

<body>

<div class="container">
<h1>Bizim Şarkımız ❤️</h1>
<button onclick="cal()">Şarkıyı Çal</button>
</div>

<audio id="muzik">
<source src="sarki.mp3" type="audio/mpeg">
</audio>

<script>

function cal(){
document.getElementById("muzik").play();
}

/* çiçek yağmuru */

for(let i=0;i<40;i++){

let flower=document.createElement("div");

flower.className="flower";

flower.innerHTML="❀";

flower.style.left=Math.random()*100+"vw";

flower.style.animationDuration=(Math.random()*4+4)+"s";

flower.style.fontSize=(Math.random()*15+20)+"px";

document.body.appendChild(flower);

}

</script>

</body>
</html>
