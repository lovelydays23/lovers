<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Şarkımız</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
overflow:hidden;
color:white;
background-image:url("foto.jpg");
background-size:cover;
background-position:center;
height:100vh;
}

/* geri sayım ekranı */

#countdown{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#c6a97a;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

/* film şeridi */

.film-frame{
position:relative;
padding:60px 40px;
background:#c6a97a;
}

.film-frame::before,
.film-frame::after{
content:"";
position:absolute;
left:0;
width:100%;
height:25px;
background:
repeating-linear-gradient(
90deg,
black 0px,
black 20px,
white 20px,
white 35px
);
}

.film-frame::before{top:-25px;}
.film-frame::after{bottom:-25px;}

/* hedef çizgileri */

.crosshair{
position:absolute;
width:300px;
height:300px;
}

.crosshair::before{
content:"";
position:absolute;
width:3px;
height:100%;
background:black;
left:50%;
}

.crosshair::after{
content:"";
position:absolute;
height:3px;
width:100%;
background:black;
top:50%;
}

/* geri sayım çemberi */

.circle{
position:relative;
width:280px;
height:280px;
border:8px solid #f5f5f5;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:140px;
font-weight:bold;
color:black;
}

/* ikinci halka */

.circle::before{
content:"";
position:absolute;
width:240px;
height:240px;
border:5px solid #f5f5f5;
border-radius:50%;
}

/* dönen ince çubuk */

.circle::after{
content:"";
position:absolute;
width:3px;
height:130px;
background:black;
top:50%;
left:50%;
transform-origin:bottom center;
transform:translate(-50%,-100%);
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:translate(-50%,-100%) rotate(0deg);}
100%{transform:translate(-50%,-100%) rotate(360deg);}
}

/* ana sayfa */

.container{
position:relative;
top:36vh;
z-index:2;
opacity:0;
animation:show 1.5s forwards;
animation-delay:3.5s;
}

@keyframes show{
to{opacity:1;}
}

h1{
font-size:42px;
margin-bottom:20px;
text-shadow:0 0 15px rgba(255,255,255,0.7);
}

/* buton */

button{
padding:15px 40px;
font-size:22px;
border:none;
border-radius:40px;
background:#b3002d;
color:white;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

/* telefon uyumu */

@media (max-width:600px){

h1{
font-size:32px;
}

button{
font-size:18px;
padding:14px 30px;
}

.circle{
width:220px;
height:220px;
font-size:100px;
}

}

</style>
</head>

<body>

<!-- geri sayım -->

<div id="countdown">
<div class="film-frame">
<div class="crosshair"></div>
<div class="circle" id="num">3</div>
</div>
</div>

<!-- ana ekran -->

<div class="container">
<h1>Bizim Şarkımız ❤️</h1>
<button onclick="cal()">Şarkıyı Çal</button>
</div>

<audio id="muzik">
<source src="sarki.mp3" type="audio/mpeg">
</audio>

<script>

let n=3;

let interval=setInterval(()=>{

n--;

if(n>0){

document.getElementById("num").innerHTML=n;

}else{

clearInterval(interval);

document.getElementById("countdown").style.display="none";

}

},1000);

function cal(){

document.getElementById("muzik").play();

}

</script>

</body>
</html>
