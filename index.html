<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Şarkımız ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
overflow:hidden;
}

#countdownScreen{
position:fixed;
width:100%;
height:100%;
background:#c5a06a;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.filmTop,.filmBottom{
position:absolute;
width:100%;
height:40px;
background:repeating-linear-gradient(
90deg,
black 0px,
black 20px,
white 20px,
white 40px
);
}

.filmTop{top:0;}
.filmBottom{bottom:0;}

.playBtn{
width:120px;
height:120px;
background:black;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.playBtn:after{
content:"";
border-left:35px solid white;
border-top:20px solid transparent;
border-bottom:20px solid transparent;
margin-left:5px;
}

#countdownNumber{
font-size:120px;
color:white;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

#wedding{
position:fixed;
width:100%;
height:100%;
background:url("foto.jpg") center/cover no-repeat;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
display:none;
}

#wedding h1{
font-size:32px;
margin-bottom:20px;
}

.musicBtn{
background:#e91e63;
border:none;
padding:14px 30px;
font-size:18px;
border-radius:30px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="countdownScreen">

<div class="filmTop"></div>
<div class="filmBottom"></div>

<div class="playBtn" onclick="startCountdown()"></div>

<div id="countdownNumber"></div>

</div>

<div id="wedding">

<h1>Bizim Şarkımız ❤️</h1>

<button class="musicBtn" onclick="playMusic()">Şarkıyı Çal</button>

</div>

<audio id="countSound" src="countdown321.mp3"></audio>
<audio id="music" src="music.mp3"></audio>

<script>

function startCountdown(){

var number = 3;
var sound = document.getElementById("countSound");
var display = document.getElementById("countdownNumber");

sound.currentTime = 0;
sound.play();

display.innerText = number;

var interval = setInterval(function(){

number--;

if(number>0){

display.innerText = number;

}else{

clearInterval(interval);

sound.pause();

document.getElementById("countdownScreen").style.display="none";
document.getElementById("wedding").style.display="flex";

}

},1000);

}

function playMusic(){

document.getElementById("music").play();

}

</script>

</body>
</html>
